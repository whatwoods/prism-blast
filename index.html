<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism Blast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-cyan: #00f0ff;
  --neon-magenta: #ff00aa;
  --neon-yellow: #ffe600;
  --bg-dark: #020204;
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); cursor: default; }
canvas { display: block; width: 100%; height: 100%; }

/* ─── LOADING SCREEN ─── */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Orbitron', sans-serif; color: var(--neon-cyan);
  transition: opacity 0.6s ease, visibility 0.6s;
}
#loading-screen.done { opacity: 0; visibility: hidden; pointer-events: none; }

#loading-screen .loader-ring {
  width: 100px; height: 100px; position: relative; margin-bottom: 40px;
}
#loading-screen .loader-ring .ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid transparent;
}
#loading-screen .loader-ring .ring:nth-child(1) {
  border-top-color: var(--neon-cyan); border-bottom-color: var(--neon-cyan);
  animation: spin 1.4s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
}
#loading-screen .loader-ring .ring:nth-child(2) {
  border-left-color: var(--neon-magenta); border-right-color: var(--neon-magenta);
  animation: spin 2.2s cubic-bezier(0.45,0.05,0.55,0.95) infinite reverse;
  inset: 12px;
}
#loading-screen .loader-ring .ring:nth-child(3) {
  border-top-color: var(--neon-yellow);
  animation: spin 3s linear infinite;
  inset: 22px;
}
#loading-screen .loader-ring .core {
  position: absolute; inset: 32px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
  animation: pulse-core 2s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-core { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }

#loading-screen .load-title {
  font-size: 14px; letter-spacing: 6px; text-transform: uppercase; opacity: 0.6; margin-bottom: 24px;
}
#loading-screen .progress-track {
  width: 280px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  position: relative;
}
#loading-screen .progress-bar {
  height: 100%; width: 0%; background: var(--neon-cyan); border-radius: 2px;
  transition: width 0.3s ease; box-shadow: 0 0 12px var(--neon-cyan);
}
#loading-screen .load-status {
  margin-top: 16px; font-family: 'Share Tech Mono', monospace; font-size: 11px;
  letter-spacing: 2px; opacity: 0.5; min-height: 16px;
}
#loading-screen .load-error {
  color: #ff4444; font-size: 13px; margin-top: 20px; text-align: center;
  line-height: 1.6; display: none;
}

/* ─── TITLE SCREEN ─── */
#title-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, rgba(0,240,255,0.06) 0%, transparent 70%);
  opacity: 0; visibility: hidden;
  transition: opacity 0.5s, visibility 0.5s;
}
#title-screen.visible { opacity: 1; visibility: visible; }
#title-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#title-screen h1 {
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(48px, 9vw, 90px);
  color: transparent;
  background: linear-gradient(180deg, #ffffff 0%, var(--neon-cyan) 80%);
  -webkit-background-clip: text;
  background-clip: text;
  filter: drop-shadow(0 0 40px rgba(0,240,255,0.4)) drop-shadow(0 0 8px rgba(0,240,255,0.6));
  letter-spacing: 14px; position: relative;
  animation: title-float 6s ease-in-out infinite;
}
@keyframes title-float {
  0%,100% { transform: translateY(0); filter: drop-shadow(0 0 40px rgba(0,240,255,0.4)) drop-shadow(0 0 8px rgba(0,240,255,0.6)); }
  50% { transform: translateY(-8px); filter: drop-shadow(0 0 60px rgba(0,240,255,0.5)) drop-shadow(0 0 12px rgba(0,240,255,0.9)); }
}
#title-screen .sub {
  font-family: 'Share Tech Mono', monospace; font-size: clamp(11px, 1.5vw, 14px);
  letter-spacing: 14px; margin-top: 6px; opacity: 0;
  color: rgba(255,255,255,0.35);
  animation: fade-up 1s ease 0.4s forwards;
}
#title-screen .controls {
  margin-top: 36px; font-family: 'Share Tech Mono', monospace; font-size: 12px;
  color: rgba(255,255,255,0.35); text-align: center; line-height: 2;
  letter-spacing: 2px; opacity: 0;
  animation: fade-up 0.8s ease 0.6s forwards;
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
#title-screen .start-btn {
  margin-top: 40px; padding: 18px 64px;
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
  letter-spacing: 8px; color: #ffffff;
  background: rgba(0, 240, 255, 0.05);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0, 240, 255, 0.3);
  border-radius: 4px;
  cursor: pointer; text-transform: uppercase;
  position: relative; overflow: hidden;
  opacity: 0; animation: fade-up 1s ease 1s forwards;
  box-shadow: 0 8px 32px rgba(0, 240, 255, 0.1), inset 0 0 12px rgba(0, 240, 255, 0.05);
  text-shadow: 0 0 12px rgba(0,240,255,0.8);
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
#title-screen .start-btn:hover {
  background: rgba(0, 240, 255, 0.15);
  border-color: rgba(0, 240, 255, 0.8);
  box-shadow: 0 12px 48px rgba(0, 240, 255, 0.2), inset 0 0 24px rgba(0, 240, 255, 0.15);
  transform: translateY(-4px);
  text-shadow: 0 0 24px rgba(0,240,255,1);
}
#title-screen .start-btn:active {
  transform: translateY(2px) scale(0.98);
  box-shadow: 0 4px 16px rgba(0, 240, 255, 0.2);
}
#title-screen .start-btn::before {
  content: ''; position: absolute; inset: -1px; border-radius: 2px;
  background: linear-gradient(135deg, rgba(0,240,255,0.3), transparent 40%, transparent 60%, rgba(120,0,255,0.3));
  z-index: -1; opacity: 0;
  transition: opacity 0.3s;
}
#title-screen .start-btn:hover::before { opacity: 1; }
#title-screen .start-btn::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  animation: btn-shine 3s ease-in-out 2s infinite;
}
@keyframes btn-shine { 0% { left: -100%; } 25%,100% { left: 200%; } }

#title-screen .deco-line { position: absolute; height: 1px; opacity: 0.1; }
#title-screen .deco-line.top {
  top: 30%; left: 50%; width: 0; transform: translateX(-50%);
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  animation: line-expand 2s ease 0.6s forwards;
}
#title-screen .deco-line.bottom {
  bottom: 30%; left: 50%; width: 0; transform: translateX(-50%);
  background: linear-gradient(90deg, transparent, rgba(255,0,170,0.6), transparent);
  animation: line-expand 2s ease 0.9s forwards;
}
@keyframes line-expand { to { width: 60%; } }
#title-screen .deco-corner { position: absolute; width: 24px; height: 24px; opacity: 0; animation: corner-fade 1s ease 1.4s forwards; }
@keyframes corner-fade { to { opacity: 0.2; } }
#title-screen .deco-corner.tl { top: 40px; left: 40px; border-top: 1px solid var(--neon-cyan); border-left: 1px solid var(--neon-cyan); }
#title-screen .deco-corner.tr { top: 40px; right: 40px; border-top: 1px solid var(--neon-cyan); border-right: 1px solid var(--neon-cyan); }
#title-screen .deco-corner.bl { bottom: 40px; left: 40px; border-bottom: 1px solid var(--neon-cyan); border-left: 1px solid var(--neon-cyan); }
#title-screen .deco-corner.br { bottom: 40px; right: 40px; border-bottom: 1px solid var(--neon-cyan); border-right: 1px solid var(--neon-cyan); }

#title-particles { position: absolute; inset: 0; pointer-events: none; }

/* ─── HUD ─── */
#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  font-family: 'Share Tech Mono', monospace; color: var(--neon-cyan);
}
#hud .corner { position: absolute; width: 100px; height: 100px; opacity: 0.4; pointer-events: none; filter: drop-shadow(0 0 6px var(--neon-cyan)); }
#hud .corner.tl { top: 20px; left: 20px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); border-top-left-radius: 8px; }
#hud .corner.tr { top: 20px; right: 20px; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); border-top-right-radius: 8px; }
#hud .corner.bl { bottom: 20px; left: 20px; border-bottom: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); border-bottom-left-radius: 8px; }
#hud .corner.br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); border-bottom-right-radius: 8px; }

#score-panel { position: absolute; top: 32px; right: 42px; text-align: right; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(0,240,255,0.6); }
#score-panel .label { font-size: 11px; letter-spacing: 6px; opacity: 0.7; text-transform: uppercase; margin-bottom: 4px; }
#score-panel .value { font-size: 42px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 20px rgba(0,240,255,0.8), 0 0 4px rgba(0,240,255,1); }

#combo-panel { position: absolute; bottom: 36px; right: 42px; text-align: right; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,0,170,0.6); }
#combo-panel .label { font-size: 11px; letter-spacing: 6px; opacity: 0.7; margin-bottom: 4px; }
#combo-panel .value { font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 20px rgba(255,0,170,0.8), 0 0 4px rgba(255,0,170,1); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

#wave-panel {
  position: absolute; bottom: 36px; left: 42px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  letter-spacing: 4px; opacity: 0.6; text-transform: uppercase;
  text-shadow: 0 0 8px rgba(0,240,255,0.4);
}

#wave-announce {
  position: fixed; top: 38%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: clamp(28px, 5vw, 48px); letter-spacing: 10px;
  color: var(--neon-cyan); opacity: 0; pointer-events: none; z-index: 20;
  text-shadow: 0 0 30px var(--neon-cyan);
  transition: opacity 0.3s, transform 0.3s;
}
#wave-announce.show { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }

#lives-panel { position: absolute; top: 32px; left: 42px; display: flex; gap: 10px; align-items: center; filter: drop-shadow(0 0 4px var(--neon-magenta)); }
.heart {
  width: 16px; height: 16px; background: var(--neon-magenta);
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
  transition: opacity 0.3s, transform 0.3s;
}
.heart.lost { opacity: 0.15; transform: scale(0.7); }
.shield-pip {
  width: 16px; height: 16px; background: var(--neon-cyan);
  clip-path: polygon(50% 0%, 100% 30%, 100% 70%, 50% 100%, 0% 70%, 0% 30%);
  opacity: 0.9; filter: drop-shadow(0 0 4px var(--neon-cyan));
  transition: opacity 0.3s, transform 0.3s;
}

#ammo-bar { position: absolute; bottom: 36px; right: 42px; display: flex; gap: 6px; align-items: center; filter: drop-shadow(0 0 6px var(--neon-cyan)); }
#ammo-bar .dot {
  width: 10px; height: 24px; background: var(--neon-cyan);
  border-radius: 2px; transition: opacity 0.15s, transform 0.15s;
}
#ammo-bar .dot.spent { opacity: 0.12; transform: scaleY(0.5); }

#powerup-indicator {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--neon-yellow); letter-spacing: 4px;
  text-shadow: 0 0 15px var(--neon-yellow);
  opacity: 0; transition: opacity 0.3s;
}
#powerup-indicator.active { opacity: 1; }

/* ─── MOBILE HUD ─── */
@media (max-width: 600px) {
  #lives-panel { top: 12px; left: 12px; gap: 4px; }
  .heart { width: 12px; height: 12px; }
  .shield-pip { width: 12px; height: 12px; }
  #ammo-bar { bottom: 12px; right: 12px; gap: 3px; }
  #ammo-bar .dot { width: 6px; height: 16px; }
  #score-panel { top: 12px; right: 12px; }
  #score-panel .value { font-size: 24px; }
  #score-panel .label { font-size: 8px; }
  #combo-panel { bottom: 12px; right: 12px; }
  #combo-panel .value { font-size: 20px; }
  #combo-panel .label { font-size: 8px; }
  #wave-panel { bottom: 12px; left: 12px; font-size: 10px; letter-spacing: 2px; }
  #powerup-indicator { bottom: 36px; font-size: 11px; letter-spacing: 2px; }
  #hud .corner { width: 60px; height: 60px; }
  #hud .corner.tl { top: 8px; left: 8px; }
  #hud .corner.tr { top: 8px; right: 8px; }
  #hud .corner.bl { bottom: 8px; left: 8px; }
  #hud .corner.br { bottom: 8px; right: 8px; }
}

/* ─── DAMAGE FLASH ─── */
#damage-flash {
  position: fixed; inset: 0; background: rgba(255,0,60,0.35); pointer-events: none;
  z-index: 12; opacity: 0; transition: opacity 0.08s;
}
#damage-flash.active { opacity: 1; }

/* ─── DANGER VIGNETTE ─── */
#danger-vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 11; opacity: 0;
  transition: opacity 0.3s;
}

/* ─── GAME OVER ─── */
#game-over {
  position: fixed; inset: 0; z-index: 60;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(6,6,14,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  opacity: 0; visibility: hidden;
  transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0.6s;
}
#game-over.visible { opacity: 1; visibility: visible; }
#game-over h2 {
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 48px;
  color: transparent;
  background: linear-gradient(180deg, #ffffff 0%, var(--neon-magenta) 80%);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,0,170,0.5)) drop-shadow(0 0 5px rgba(255,0,170,0.8));
  letter-spacing: 12px;
}
#game-over .final-score {
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 80px;
  color: var(--neon-cyan); margin: 20px 0;
  text-shadow: 0 0 40px rgba(0,240,255,0.4), 0 0 10px rgba(0,240,255,0.8);
}
#game-over .stat-line {
  font-family: 'Share Tech Mono', monospace; font-size: 14px;
  color: rgba(255,255,255,0.6); letter-spacing: 4px; margin-bottom: 40px;
}
#game-over .restart-btn {
  padding: 16px 56px; font-family: 'Orbitron', sans-serif; font-weight: 700;
  font-size: 16px; letter-spacing: 6px; color: #fff;
  background: rgba(255, 0, 170, 0.1); backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 0, 170, 0.4); border-radius: 4px;
  cursor: pointer; text-transform: uppercase;
  box-shadow: 0 8px 32px rgba(255, 0, 170, 0.15), inset 0 0 12px rgba(255, 0, 170, 0.05);
  text-shadow: 0 0 12px rgba(255, 0, 170, 0.8);
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  pointer-events: auto;
}
#game-over .restart-btn:hover { 
  background: rgba(255, 0, 170, 0.25); border-color: rgba(255, 0, 170, 0.8);
  box-shadow: 0 12px 48px rgba(255, 0, 170, 0.3), inset 0 0 24px rgba(255, 0, 170, 0.15);
  transform: translateY(-4px); text-shadow: 0 0 24px rgba(255, 0, 170, 1);
}
#game-over .restart-btn:active {
  transform: translateY(2px) scale(0.98);
}

/* ─── SCORE POPUPS ─── */
.score-popup {
  position: fixed; z-index: 20; pointer-events: none;
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 22px;
  color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan);
  animation: pop-up 0.9s ease-out forwards;
}
.bonus-popup {
  position: fixed; z-index: 20; pointer-events: none;
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px;
  color: var(--neon-yellow); text-shadow: 0 0 20px var(--neon-yellow);
  animation: pop-up 1.2s ease-out forwards;
}
@keyframes pop-up {
  0% { opacity: 1; transform: translateY(0) translateX(-50%) scale(0.8); }
  100% { opacity: 0; transform: translateY(-60px) translateX(-50%) scale(1.2); }
}

/* ─── SCANLINES ─── */
#scanlines {
  position: fixed; inset: 0; z-index: 9; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
}
</style>
</head>
<body>
<!-- ─── LOADING SCREEN ─── -->
<div id="loading-screen">
  <div class="loader-ring">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="core"></div>
  </div>
  <div class="load-title">系统初始化中</div>
  <div class="progress-track"><div class="progress-bar" id="load-bar"></div></div>
  <div class="load-status" id="load-status">正在加载核心模块...</div>
  <div class="load-tips" style="margin-top:24px;font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3);text-align:center;line-height:2;letter-spacing:2px;">
    点击发射 &mdash; 长按连射<br>
    在目标靠近前击毁他们
  </div>
  <div class="load-error" id="load-error"></div>
</div>

<!-- ─── TITLE SCREEN ─── -->
<div id="title-screen">
  <canvas id="title-particles"></canvas>
  <div class="deco-line top"></div>
  <div class="deco-line bottom"></div>
  <div class="deco-corner tl"></div><div class="deco-corner tr"></div>
  <div class="deco-corner bl"></div><div class="deco-corner br"></div>
  <h1>PRISM BLAST</h1>
  <div class="sub">TUNNEL SHOOTER</div>
  <button class="start-btn" id="start-btn">开始战斗</button>
  <div class="controls">
    点击发射 &mdash; 长按连射<br>
    在目标靠近前击毁他们
  </div>
</div>

<!-- ─── GAME OVER ─── -->
<div id="game-over">
  <h2>信号丢失</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="stat-line" id="stat-line">击毁目标: 0 &bull; 最高连击: x1</div>
  <button class="restart-btn" id="restart-btn">重新连接</button>
</div>

<!-- ─── HUD ─── -->
<div id="hud">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="score-panel"><div class="label">分数</div><div class="value" id="score-val">0</div></div>
  <div id="wave-panel">第 1 波</div>
  <div id="combo-panel"><div class="label">连击</div><div class="value" id="combo-val">x1</div></div>
  <div id="lives-panel"></div>
  <div id="powerup-indicator"></div>
  <div id="ammo-bar" style="display:none"></div>
</div>

<div id="damage-flash"></div>
<div id="danger-vignette"></div>
<div id="wave-announce"></div>
<div id="scanlines"></div>

<!-- PLACEHOLDER: Title screen animation script -->
<script>
// ─── TITLE SCREEN — Wireframe tunnel + scanning energy ───
(function initTitleFX() {
  const c = document.getElementById('title-particles');
  if (!c) return;
  const ctx = c.getContext('2d');
  let raf, t = 0;
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const rings = [];
  for (let i = 0; i < 28; i++) {
    rings.push({ z: i * 0.12, segments: 8 + Math.floor(Math.random() * 4) * 2 });
  }
  const debris = [];
  for (let i = 0; i < 18; i++) {
    debris.push({
      x: Math.random() * 1.6 - 0.8, y: Math.random() * 1.6 - 0.8, z: Math.random() * 2.5,
      rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.8,
      size: 1.5 + Math.random() * 3, sides: Math.random() < 0.5 ? 3 : Math.random() < 0.5 ? 4 : 6,
      drift: { x: (Math.random()-0.5)*0.002, y: (Math.random()-0.5)*0.002, z: -0.003 - Math.random()*0.003 },
      hue: Math.random() < 0.7 ? 186 : 320, alpha: 0.08 + Math.random() * 0.12,
    });
  }
  let scanY = 0, scanDir = 1;
  function project(x3, y3, z3, cx, cy) {
    const fov = 1.8, d = Math.max(z3 + 0.5, 0.01), scale = fov / d;
    return { x: cx + x3 * scale * cy, y: cy + y3 * scale * cy, s: scale };
  }
  function draw() {
    const W = c.width, H = c.height, cx = W * 0.5, cy = H * 0.5;
    ctx.clearRect(0, 0, W, H); t += 0.008;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Master low-pass filter for hit-stop "underwater" effect
      masterFilter = audioCtx.createBiquadFilter();
      masterFilter.type = 'lowpass';
      masterFilter.frequency.value = 22000; // wide open by default
      masterFilter.Q.value = 0.7;
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      masterFilter.connect(masterGain);
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  function getMasterOut() { return masterFilter || audioCtx.destination; }
  function playShoot() {
    ensureAudio();
    const t = audioCtx.currentTime, out = getMasterOut();
    
    // Deep muffled thump (低沉闷响)
    // Layer 1: Low Sine punch
    const sub = audioCtx.createOscillator(), subGain = audioCtx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(180, t);
    sub.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    subGain.gain.setValueAtTime(0.3, t);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    sub.connect(subGain); subGain.connect(out);
    sub.start(t); sub.stop(t + 0.12);
    
    // Layer 2: Muffled Triangle thud
    const osc = audioCtx.createOscillator(), oscG = audioCtx.createGain(), lpf = audioCtx.createBiquadFilter();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.1);
    
    lpf.type = 'lowpass';
    lpf.frequency.setValueAtTime(800, t); // very low cutoff for muffled feel
    lpf.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    lpf.Q.value = 1;
    
    oscG.gain.setValueAtTime(0.2, t);
    oscG.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    
    osc.connect(lpf); lpf.connect(oscG); oscG.connect(out);
    osc.start(t); osc.stop(t + 0.1);
    
    // Layer 3: Minimal filtered noise for soft attack (no high-pass crackle)
    const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
    const d = nBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const nSrc = audioCtx.createBufferSource(), nFilt = audioCtx.createBiquadFilter(), nGain = audioCtx.createGain();
    nSrc.buffer = nBuf;
    nFilt.type = 'lowpass'; nFilt.frequency.value = 400; // Only let low-mid noise through
    nGain.gain.setValueAtTime(0.08, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(out);
    nSrc.start(t);
  }
  // ─── HAPTIC FEEDBACK (mobile) ───
  function vibrate() { if (navigator.vibrate) navigator.vibrate(50); }

  function playHit() {
    ensureAudio();
    const t = audioCtx.currentTime, out = getMasterOut();
    
    // EDM Synth Snare / Clap hybrid
    // Layer 1: Snare body (Square wave pitch drop)
    const osc = audioCtx.createOscillator(), oscG = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
    oscG.gain.setValueAtTime(0.12, t);
    oscG.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscG); oscG.connect(out);
    osc.start(t); osc.stop(t + 0.1);
    
    // Layer 2: White Noise Blast (Filtered Crackle)
    const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const d = nBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
    const nSrc = audioCtx.createBufferSource(), nFilt = audioCtx.createBiquadFilter(), nGain = audioCtx.createGain();
    nSrc.buffer = nBuf;
    nFilt.type = 'bandpass'; nFilt.frequency.value = 2500; nFilt.Q.value = 1.0;
    nGain.gain.setValueAtTime(0.2, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(out);
    nSrc.start(t);
    
    // Layer 3: Heavy Sub Punch (808 style bottom)
    const sub = audioCtx.createOscillator(), subG = audioCtx.createGain();
    sub.type = 'sine'; sub.frequency.setValueAtTime(100, t);
    sub.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    subG.gain.setValueAtTime(0.25, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    sub.connect(subG); subG.connect(out);
    sub.start(t); sub.stop(t + 0.12);
  }
  function playDamage() {
    ensureAudio();
    const t = audioCtx.currentTime, out = getMasterOut();
    
    // Heavy EDM Sub Wobble Down (Cyber Glitch)
    const duration = 0.6;
    
    // Two detuned oscillators for thick reese bass feel
    [120, 117].forEach((freq) => {
      const osc = audioCtx.createOscillator();
      const lpf = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();
      
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + duration);
      
      lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(2000, t);
      lpf.frequency.exponentialRampToValueAtTime(50, t + duration);
      lpf.Q.value = 2.0;
      
      gain.gain.setValueAtTime(0.3, t);
      // Stutter effect for EDM glitched feel
      for (let i = 0; i < 8; i++) {
        const step = t + (i / 8) * duration * 0.8;
        gain.gain.linearRampToValueAtTime(0.05, step);
        gain.gain.linearRampToValueAtTime(0.3, step + 0.02);
      }
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      
      osc.connect(lpf); lpf.connect(gain); gain.connect(out);
      osc.start(t); osc.stop(t + duration);
    });
    
    // Initial distortion crash (White noise punch)
    const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const nSrc = audioCtx.createBufferSource(), nFp = audioCtx.createBiquadFilter(), nG = audioCtx.createGain();
    nSrc.buffer = noiseBuf;
    nFp.type = 'lowpass'; nFp.frequency.value = 800;
    nG.gain.setValueAtTime(0.2, t);
    nG.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    nSrc.connect(nFp); nFp.connect(nG); nG.connect(out);
    nSrc.start(t);
  }
  function playPowerup() {
    ensureAudio();
    const t = audioCtx.currentTime, out = getMasterOut();
    
    // Synthwave Arpeggio Build-up (Square Wave + Filter Sweep)
    const freqs = [523.25, 622.25, 783.99, 932.33, 1174.66]; // C5, D#5, G5, A#5, D6
    const seqLen = freqs.length, noteDur = 0.05;
    
    const masterLpf = audioCtx.createBiquadFilter();
    masterLpf.type = 'lowpass';
    masterLpf.frequency.setValueAtTime(400, t);
    masterLpf.frequency.exponentialRampToValueAtTime(8000, t + seqLen * noteDur);
    masterLpf.Q.value = 4.0;
    masterLpf.connect(out);
    
    freqs.forEach((f, i) => {
      const startTime = t + i * noteDur;
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.value = f;
      
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.08, startTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.3); // chord wash ring-out
      
      osc.connect(gain); gain.connect(masterLpf);
      osc.start(startTime); osc.stop(startTime + 0.3);
    });
  }
  var bgmAudioEl, bgmSource;
  function startMusic() {
    ensureAudio();
    if (!bgmAudioEl) {
      bgmAudioEl = new Audio('bgm.ogg');
      bgmAudioEl.loop = true;
      bgmAudioEl.volume = 0.8;
      
      // 当通过双击本地文件运行 (file://) 时，浏览器的 CORS 安全策略会阻止关联 Web Audio API (会输出无声)
      // 因此只有在通过 HTTP 服务器访问时，才将背景音乐接入滤波特效流
      if (window.location.protocol !== 'file:') {
        try {
          bgmSource = audioCtx.createMediaElementSource(bgmAudioEl);
          bgmSource.connect(getMasterOut());
        } catch (e) {
          console.warn('AudioContext routing failed:', e);
        }
      }
    }
    bgmAudioEl.play().catch(e => console.warn('BGM play failed:', e));
  }
  function stopMusic() {

    }
  }

  // ─── HIT-STOP AUDIO: Underwater LPF cut + release burst ───
  function engageHitStopAudio() {
    if (!masterFilter || hitStopAudioActive) return;
    hitStopAudioActive = true;
    const now = audioCtx.currentTime;
    masterFilter.frequency.cancelScheduledValues(now);
    masterFilter.frequency.setValueAtTime(masterFilter.frequency.value, now);
    // Slam the low-pass down to 400Hz in 15ms — "underwater" muffle
    masterFilter.frequency.exponentialRampToValueAtTime(400, now + 0.015);
    masterFilter.Q.setValueAtTime(2.0, now); // slight resonance bump
  }
  function releaseHitStopAudio() {
    if (!masterFilter || !hitStopAudioActive) return;
    hitStopAudioActive = false;
    const now = audioCtx.currentTime;
    masterFilter.frequency.cancelScheduledValues(now);
    masterFilter.frequency.setValueAtTime(masterFilter.frequency.value, now);
    // Snap open to full spectrum in 30ms — the "release burst"
    masterFilter.frequency.exponentialRampToValueAtTime(22000, now + 0.03);
    masterFilter.Q.linearRampToValueAtTime(0.7, now + 0.03);
    // Play a short burst noise to emphasize the release
    playHitStopRelease();
  }
  function playHitStopRelease() {
    const t = audioCtx.currentTime;
    
    // Sub impact punch
    const sub = audioCtx.createOscillator(), subG = audioCtx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(100, t);
    sub.frequency.exponentialRampToValueAtTime(30, t + 0.2);
    subG.gain.setValueAtTime(0.25, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    sub.connect(subG); subG.connect(getMasterOut());
    sub.start(t); sub.stop(t + 0.2);
    
    // Sharp high-pass synth burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource(), lpf = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
    src.buffer = buf;
    lpf.type = 'bandpass';
    lpf.frequency.setValueAtTime(4000, t);
    lpf.frequency.exponentialRampToValueAtTime(300, t + 0.15);
    lpf.Q.value = 1.5;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(lpf); lpf.connect(g); g.connect(getMasterOut());
    src.start(t);
  }

  // ─── OBJECT POOLS ───
  function initBulletPool() {
    sharedBulletGeo = new THREE.SphereGeometry(BALL_RADIUS * 0.45, 12, 12);
    sharedBulletMat = new THREE.MeshPhysicalMaterial({
      color: COL_CYAN, emissive: COL_CYAN, emissiveIntensity: 1.8,
      metalness: 1, roughness: 0, clearcoat: 1.0
    });
    sharedTrailMat = new THREE.ShaderMaterial({
      uniforms: { u_color: { value: new THREE.Color(COL_CYAN) } },
      vertexShader: [
        'attribute float alpha;',
        'varying float vAlpha;',
        'void main() {',
        '  vAlpha = alpha;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
        '}'
      ].join('\n'),
      fragmentShader: [
        'uniform vec3 u_color;',
        'varying float vAlpha;',
        'void main() {',
        '  gl_FragColor = vec4(u_color * 2.0, vAlpha * 0.7);',
        '}'
      ].join('\n'),
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
    });

    for (let p = 0; p < BULLET_POOL_SIZE; p++) {
      const mesh = new THREE.Mesh(sharedBulletGeo, sharedBulletMat);
      mesh.visible = false;
      scene.add(mesh);

      const trailGeo = new THREE.BufferGeometry();
      const trailPositions = new Float32Array(TRAIL_MAX_POINTS * 3);
      trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
      const trailAlphas = new Float32Array(TRAIL_MAX_POINTS);
      for (let i = 0; i < TRAIL_MAX_POINTS; i++) trailAlphas[i] = 1.0 - i / TRAIL_MAX_POINTS;
      trailGeo.setAttribute('alpha', new THREE.BufferAttribute(trailAlphas, 1));
      const trail = new THREE.Line(trailGeo, sharedTrailMat);
      trail.visible = false;
      scene.add(trail);

      const body = {
        position: { x: 0, y: 9999, z: 0 },
        velocity: { x: 0, y: 0, z: 0 },
      };

      bulletPool.push({ mesh, body, trail, trailPositions, active: false, age: 0 });
    }
  }

  function acquireBullet(startPos, dir) {
    let entry = null;
    for (let i = 0; i < bulletPool.length; i++) {
      if (!bulletPool[i].active) { entry = bulletPool[i]; break; }
    }
    if (!entry) return null; // pool exhausted

    entry.active = true;
    entry.age = 0;
    entry.mesh.visible = true;
    entry.mesh.position.copy(startPos);
    entry.trail.visible = true;

    // Pre-distribute trail positions to avoid massive overlapping bloom on frame 1
    const tp = entry.trailPositions;
    for (let i = 0; i < TRAIL_MAX_POINTS; i++) {
        const offset = i * 0.05;
        tp[i * 3] = startPos.x - dir.x * offset;
        tp[i * 3 + 1] = startPos.y - dir.y * offset;
        tp[i * 3 + 2] = startPos.z - dir.z * offset;
    }
    entry.trail.geometry.attributes.position.needsUpdate = true;

    entry.body.position.x = startPos.x; entry.body.position.y = startPos.y; entry.body.position.z = startPos.z;
    entry.body.velocity.x = dir.x * BALL_SPEED; entry.body.velocity.y = dir.y * BALL_SPEED; entry.body.velocity.z = dir.z * BALL_SPEED;

    return entry;
  }

  function releaseBullet(entry) {
    entry.active = false;
    entry.mesh.visible = false;
    entry.trail.visible = false;
    entry.body.velocity.x = 0; entry.body.velocity.y = 0; entry.body.velocity.z = 0;
    entry.body.position.x = 0; entry.body.position.y = 9999; entry.body.position.z = 0;
  }

  function initObstaclePool() {
    for (let p = 0; p < OBSTACLE_POOL_SIZE; p++) {
      const group = new THREE.Group();
      group.visible = false;

      // Core: Icosahedron with PBR + Fresnel rim glow
      const coreGeo = new THREE.IcosahedronGeometry(1, 0); // unit size, scaled via group
      const coreMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 1.5,
        metalness: 0.9,
        roughness: 0.1,
        clearcoat: 1.0,
        clearcoatRoughness: 0.05,
      });
      coreMat.onBeforeCompile = (shader) => {
        shader.fragmentShader = shader.fragmentShader.replace(
          '#include <emissivemap_fragment>',
          [
            '#include <emissivemap_fragment>',
            '{',
            '  vec3 viewDir = normalize(vViewPosition);',
            '  vec3 normal = normalize(vNormal);',
            '  float fresnel = pow(1.0 - abs(dot(viewDir, normal)), 3.0);',
            '  totalEmissiveRadiance += fresnel * vec3(0.4, 0.7, 0.9) * 2.5;',
            '}'
          ].join('\n')
        );
      };
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.name = 'core';
      group.add(core);

      // Shell: wireframe
      const shellGeo = new THREE.IcosahedronGeometry(1, 0);
      const shellMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.22,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const shell = new THREE.Mesh(shellGeo, shellMat);
      shell.name = 'shell';
      shell.scale.set(1.15, 1.15, 1.15);
      group.add(shell);

      // Pre-create 2 torus rings (for hp > 1, max hp=3 means 2 rings)
      const rings = [];
      for (let r = 0; r < 2; r++) {
        const rGeo = new THREE.TorusGeometry(1, 0.025, 6, 16); // unit radius, scaled later
        const rMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.5 });
        const ringMesh = new THREE.Mesh(rGeo, rMat);
        ringMesh.name = 'ring' + r;
        ringMesh.visible = false;
        group.add(ringMesh);
        rings.push(ringMesh);
      }

      scene.add(group);

      const body = {
        position: { x: 0, y: 9999, z: 0 },
        radius: 1,
      };

      obstaclePool.push({
        group, body, core, shell, rings, coreMat, shellMat,
        active: false, speed: 0, size: 0, hp: 0, maxHp: 0, color: new THREE.Color()
      });
    }
  }

  function acquireObstacle(px, py, pz, size, hp, color, emissive, speed) {
    let entry = null;
    for (let i = 0; i < obstaclePool.length; i++) {
      if (!obstaclePool[i].active) { entry = obstaclePool[i]; break; }
    }
    if (!entry) return null; // pool exhausted

    entry.active = true;
    entry.size = size;
    entry.hp = hp;
    entry.maxHp = hp;
    entry.speed = speed;
    entry.color.copy(color);

    // Update core geometry scale and material
    const coreScale = size * 0.45;
    entry.core.scale.set(coreScale, coreScale, coreScale);
    entry.core.rotation.set(0, 0, 0);
    entry.coreMat.color.copy(color);
    entry.coreMat.emissive.copy(emissive);
    entry.coreMat.emissiveIntensity = 1.5;
    entry.coreMat.needsUpdate = true;

    // Update shell
    const shellScale = size * 0.52 * 1.15;
    entry.shell.scale.set(shellScale, shellScale, shellScale);
    entry.shell.rotation.set(0, 0, 0);
    entry.shellMat.color.copy(color).multiplyScalar(1.3);
    entry.shellMat.needsUpdate = true;

    // Show/hide rings based on HP
    for (let r = 0; r < 2; r++) {
      if (r < hp - 1) {
        entry.rings[r].visible = true;
        const ringScale = size * 0.5 + r * 0.15;
        entry.rings[r].scale.set(ringScale, ringScale, ringScale);
      } else {
        entry.rings[r].visible = false;
      }
    }

    entry.group.visible = true;
    entry.group.position.set(px, py, pz);
    entry.group.scale.set(1, 1, 1);

    // Update physics body
    entry.body.radius = size * 0.6;
    entry.body.position.x = px; entry.body.position.y = py; entry.body.position.z = pz;

    return entry;
  }

  function releaseObstacle(entry) {
    entry.active = false;
    entry.group.visible = false;
    entry.body.position.x = 0; entry.body.position.y = 9999; entry.body.position.z = 0;
  }

  // ─── INIT ───
  function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020204, 0.012);
    camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 2);
    camera.lookAt(0, 0, -TUNNEL_LENGTH);
    scene.add(camera);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    // ─── POST-PROCESSING: Bloom (tight threshold) + Glitch/Vignette/CA ───
    // Force UnsignedByteType render target — HalfFloatType (default) causes
    // black wedge artifacts on many mobile GPUs lacking EXT_color_buffer_half_float
    const composerRT = new THREE.WebGLRenderTarget(
      innerWidth * Math.min(devicePixelRatio, 2),
      innerHeight * Math.min(devicePixelRatio, 2),
      { type: THREE.UnsignedByteType }
    );
    composer = new EffectComposer(renderer, composerRT);
    composer.addPass(new RenderPass(scene, camera));
    bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.6, 0.92);
    composer.addPass(bloomPass);

    const glitchShaderDef = {
      uniforms: {
        tDiffuse: { value: null },
        u_intensity: { value: 0.0 },
        u_aberration: { value: 0.0 },
        u_time: { value: 0.0 },
        u_dofStrength: { value: 0.012 },
      },
      vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
      fragmentShader: GLITCH_FRAG
    };
    glitchPass = new ShaderPass(glitchShaderDef);
    composer.addPass(glitchPass);

    clock = new THREE.Clock();

    createTunnel();
    createStarfield();
    createLights();
    createTrajectoryLine();
    createLivesUI();
    initBulletPool();
    initObstaclePool();
    initExplosionPool();
    initDebrisPool();

    window.addEventListener('resize', onResize);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mousedown', onShoot);
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchstart', onTouchStart, { passive: false });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    window.addEventListener('touchend', onPointerUp);
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', restartGame);
    animate();
  }

  // ═══ 1. SHADER TUNNEL ═══
  function createTunnel() {
    const geo = new THREE.CylinderGeometry(TUNNEL_RADIUS, TUNNEL_RADIUS, TUNNEL_LENGTH, 64, 40, true);
    // DON'T use geo.scale(-1,1,1) — negative scale causes rasterization
    // artifacts on mobile GPUs. Use BackSide instead to view the interior.
    geo.rotateX(Math.PI / 2);

    tunnelUniforms = {
      u_time: { value: 0.0 },
      u_pulse: { value: 0.0 },
      u_hueShift: { value: 0.0 },
      u_ripples: { value: [
        new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(),
        new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()
      ]},
      u_rippleCount: { value: 0 },
      u_scrollSpeed: { value: 0.04 },
      u_combo: { value: 0.0 },
    };

    const mat = new THREE.ShaderMaterial({
      uniforms: tunnelUniforms,
      vertexShader: TUNNEL_VERT,
      fragmentShader: TUNNEL_FRAG,
      side: THREE.BackSide,   // render interior faces (replaces scale(-1,1,1))
      precision: 'highp',     // force highp on mobile — mediump breaks noise/fbm
    });

    tunnelMesh = new THREE.Mesh(geo, mat);
    tunnelMesh.frustumCulled = false; // camera is inside — prevent false culling
    tunnelMesh.position.z = -TUNNEL_LENGTH / 2 + 2;
    scene.add(tunnelMesh);

    // Structural ring accents (stored for movement)
    const ringGeo = new THREE.TorusGeometry(TUNNEL_RADIUS - 0.02, 0.05, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: COL_CYAN, transparent: true, opacity: 0.07,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    for (let z = 0; z > -TUNNEL_LENGTH; z -= 10) {
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.z = z;
      scene.add(ring);
      tunnelRings.push(ring);
    }
  }

  function createLights() {
    scene.add(new THREE.AmbientLight(0x1a202c, 0.4)); // 降低环境光强度
    const p1 = new THREE.PointLight(COL_CYAN, 1.5, 30); p1.position.set(0, 0, 0); scene.add(p1);
    // 移除不必要的深处点光源，避免隧道内出现诡异的反光点
  }

  function createStarfield() {
    // --- A. Warp speed star lines (LineSegments) ---
    const N = 400;
    const pos = new Float32Array(N * 2 * 3);
    const cols = new Float32Array(N * 2 * 3);
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = (TUNNEL_RADIUS - 0.2) * (0.3 + Math.random() * 0.7);
      const z = -Math.random() * TUNNEL_LENGTH;
      const length = 1.0 + Math.random() * 4.0;
      pos[i*6] = Math.cos(a)*r; pos[i*6+1] = Math.sin(a)*r; pos[i*6+2] = z;
      pos[i*6+3] = Math.cos(a)*r; pos[i*6+4] = Math.sin(a)*r; pos[i*6+5] = z - length;
      cols[i*6]=0.5; cols[i*6+1]=0.9; cols[i*6+2]=1.0;
      cols[i*6+3]=0.0; cols[i*6+4]=0.2; cols[i*6+5]=0.5;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    starLines = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.6,
      blending: THREE.AdditiveBlending, depthWrite: false
    }));
    scene.add(starLines);

    // --- B. FBM Nebula end-cap ---
    nebulaUniforms = { u_time: { value: 0.0 }, u_hueShift: { value: 0.0 } };
    const nebMat = new THREE.ShaderMaterial({
      uniforms: nebulaUniforms,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
      vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
      fragmentShader: [
        'uniform float u_time; uniform float u_hueShift; varying vec2 vUv;',
        'float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }',
        'float noise(vec2 p) {',
        '  vec2 i = floor(p), f = fract(p);',
        '  vec2 u = f*f*(3.0-2.0*f);',
        '  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),',
        '             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);',
        '}',
        'float fbm(vec2 p) {',
        '  float f=0.0, amp=0.5;',
        '  for(int i=0; i<4; i++){ f += amp*noise(p); p*=2.0; amp*=0.5; }',
        '  return f;',
        '}',
        'vec3 hsv2rgb(vec3 c) { vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0); vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y); }',
        'void main() {',
        '  vec2 uv = vUv * 2.0 - 1.0;',
        '  float d = length(uv);',
        '  float t = u_time * 0.2;',
        '  mat2 rot = mat2(cos(t), -sin(t), sin(t), cos(t));',
        '  vec2 p = rot * uv * 3.0;',
        '  float n = fbm(p - vec2(0.0, u_time*0.5));',
        '  float coreMask = smoothstep(0.15, 0.4, d);',
        '  float edgeMask = smoothstep(1.0, 0.6, d);',
        '  vec3 col1 = hsv2rgb(vec3(0.6 + u_hueShift, 0.8, 0.1));',
        '  vec3 col2 = hsv2rgb(vec3(0.5 + u_hueShift, 0.6, 1.0));',
        '  vec3 finalCol = mix(col1, col2, n * 1.5) * coreMask * edgeMask;',
        '  gl_FragColor = vec4(finalCol, finalCol.r * 2.0);',
        '}'
      ].join('\n')
    });
    const neb = new THREE.Mesh(new THREE.SphereGeometry(TUNNEL_RADIUS * 1.5, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5), nebMat);
    neb.rotation.x = Math.PI;
    neb.position.z = -TUNNEL_LENGTH + 5;
    scene.add(neb);
  }

  function createTrajectoryLine() {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
    geo.setDrawRange(0, 2);
    trajectoryLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: COL_CYAN, transparent: true, opacity: 0.4 }));
    scene.add(trajectoryLine);
  }

  function computeTrajectory() {
    const pa = trajectoryLine.geometry.attributes.position, dir = getAimDirection();
    const s = new THREE.Vector3(0, 0, 0.5), e = s.clone().addScaledVector(dir, TRAJECTORY_LEN);
    pa.array[0]=s.x; pa.array[1]=s.y; pa.array[2]=s.z;
    pa.array[3]=e.x; pa.array[4]=e.y; pa.array[5]=e.z;
    pa.needsUpdate = true;
  }

  function createAmmoUI() { ammoBarEl.innerHTML=''; for(let i=0;i<maxAmmo;i++){const d=document.createElement('div');d.className='dot';ammoBarEl.appendChild(d);} }
  function updateAmmoUI() { ammoBarEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('spent', i >= ammo)); }
  function createLivesUI() { livesPanel.innerHTML=''; for(let i=0;i<MAX_LIVES;i++){const h=document.createElement('div');h.className='heart';livesPanel.appendChild(h);} }
  function updateLivesUI() {
    livesPanel.querySelectorAll('.heart').forEach((h,i) => h.classList.toggle('lost', i >= lives));
    // Shield indicators
    livesPanel.querySelectorAll('.shield-pip').forEach(s => s.remove());
    for (let i = 0; i < shield; i++) {
      const s = document.createElement('div'); s.className = 'shield-pip'; livesPanel.appendChild(s);
    }
  }
  function getAimDirection() {
    const n = new THREE.Vector3(mouseNDC.x, mouseNDC.y, 0.5); n.unproject(camera);
    return n.sub(camera.position).normalize();
  }

  // ═══ 2. COMPOSITE OBSTACLES (Icosahedron core + wireframe shell, PBR) ═══
  function spawnObstacle() {
    const size = 0.6 + Math.random() * 0.8;
    const angle = Math.random() * Math.PI * 2;
    const maxR = TUNNEL_RADIUS - size - 0.5;
    const dist = Math.random() * maxR;
    const px = Math.cos(angle) * dist, py = Math.sin(angle) * dist;
    const pz = -TUNNEL_LENGTH + 5;
    const hp = (wave >= 5 && Math.random() < 0.25) ? 2 : (wave >= 9 && Math.random() < 0.15) ? 3 : 1;
    // Desaturated color palette for obstacles
    const hue = hp === 1 ? Math.random() : hp === 2 ? 0.08 : 0.0;
    const color = new THREE.Color().setHSL(hue, 0.65, 0.5);
    const emissive = new THREE.Color().setHSL(hue, 0.75, 0.35);
    const speed = OBSTACLE_SPEED + difficulty * 1.0;

    const entry = acquireObstacle(px, py, pz, size, hp, color, emissive, speed);
    if (!entry) return;
    obstacles.push({ mesh: entry.group, body: entry.body, speed, size, hp, maxHp: hp, color: color.clone(), coreMat: entry.coreMat, shellMat: entry.shellMat, _poolEntry: entry });
  }

  // ═══ 3. SHOOTING — No PointLight, with Trail ═══
  function shootBall() {
    playShoot();
    const dir = getAimDirection(), startPos = new THREE.Vector3(0, 0, 0.5);
    const dirs = [dir];
    if (activePowerup === 'triple') {
      const spread = 0.08;
      const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();
      dirs.push(dir.clone().addScaledVector(right, spread).normalize());
      dirs.push(dir.clone().addScaledVector(right, -spread).normalize());
    }
    dirs.forEach(d => fireBall(startPos.clone(), d));
  }

  function fireBall(startPos, dir) {
    const entry = acquireBullet(startPos, dir);
    if (!entry) return;
    balls.push(entry);
  }

  function updateTrails() {
    balls.forEach(b => {
      const tp = b.trailPositions;
      // Shift positions back
      for (let i = TRAIL_MAX_POINTS - 1; i > 0; i--) {
        tp[i*3] = tp[(i-1)*3]; tp[i*3+1] = tp[(i-1)*3+1]; tp[i*3+2] = tp[(i-1)*3+2];
      }
      tp[0] = b.body.position.x; tp[1] = b.body.position.y; tp[2] = b.body.position.z;
      b.trail.geometry.attributes.position.needsUpdate = true;
    });
  }

  // ═══ HIT / DESTROY ═══
  function hitObstacle(idx, ballDir) {
    const obs = obstacles[idx];
    const impactDir = ballDir ? ballDir.clone().normalize() : new THREE.Vector3(0, 0, -1);
    obs.hp--;
    if (obs.hp <= 0) {
      spawnDebris(obs.mesh.position.clone(), obs.color, impactDir, obs.maxHp > 1 ? 12 : 8);
      releaseObstacle(obs._poolEntry);
      obstacles.splice(idx, 1);
      kills++; waveKills++;
      combo++; if (combo > maxCombo) maxCombo = combo;
      comboTimer = 2.0;
      const pts = 100 * combo * (obs.maxHp || 1);
      score += pts; scoreEl.textContent = score;
      comboEl.textContent = 'x' + combo;
      comboEl.style.transform = 'scale(1.4)';
      setTimeout(() => comboEl.style.transform = 'scale(1)', 150);
      spawnScorePopup(pts);
      const killDist = Math.abs(obs.mesh.position.z);
      if (killDist > TUNNEL_LENGTH * 0.6) {
        const bonus = 500; score += bonus; scoreEl.textContent = score;
        spawnBonusPopup('狙击 +' + bonus);
      }
      shakeIntensity = Math.min(shakeIntensity + 0.15, 0.6);
      tunnelPulse = 0.15;
      fovPulse = Math.min(fovPulse + 0.3, 1.0);
      // Hit stop: 40ms on kill
      hitStopTimer = 0.04;
      if (obs.maxHp > 1) {
        glitchIntensity = Math.min(glitchIntensity + 0.6, 1.0);
        tunnelUniforms.u_hueShift.value += 0.1;
        hitStopTimer = 0.06; // longer for big kills
      }
      playHit(); vibrate();
      if (waveKills >= waveThreshold) {
        // Enter wave break — stop spawning, let remaining obstacles clear
        waveBreakTimer = WAVE_BREAK_DURATION;
        waveKills = 0;
        // Restore resources
        maxAmmo++;
        lives = MAX_LIVES; updateLivesUI();
        // Spawn powerup during break
        spawnPowerup();
      }
    } else {
      obs.coreMat.emissiveIntensity = 4.0;
      const origColor = obs.coreMat.color.clone();
      obs.coreMat.color.set(0xffffff);
      setTimeout(() => { obs.coreMat.color.copy(origColor); obs.coreMat.emissiveIntensity = 1.5; }, 80);
      createGPUExplosion(obs.mesh.position.clone(), obs.color, 30, impactDir);
      playHit(); shakeIntensity = Math.min(shakeIntensity + 0.05, 0.3);
      hitStopTimer = 0.015; // light hitstop on non-kill
    }
  }

  function announceWave(w) {
    waveAnnEl.textContent = '第 ' + w + ' 波';
    waveAnnEl.classList.remove('show'); void waveAnnEl.offsetWidth;
    waveAnnEl.classList.add('show');
    setTimeout(() => waveAnnEl.classList.remove('show'), 2000);
  }

  // ─── POWERUPS ───
  const POWERUP_TYPES = [
    { name: '急速射击', color: COL_GOLD, effect: 'rapid' },
    { name: '三连发', color: COL_GREEN, effect: 'triple' },
    { name: '护盾', color: COL_MAGENTA, effect: 'shield' },
  ];
  function spawnPowerup() {
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    const a = Math.random() * Math.PI * 2, r = Math.random() * (TUNNEL_RADIUS - 1.5);
    const geo = new THREE.OctahedronGeometry(0.4, 0);
    // No PointLight — rely on emissive + bloom
    const mat = new THREE.MeshPhysicalMaterial({
      color: type.color, emissive: type.color, emissiveIntensity: 2.5,
      metalness: 1, roughness: 0, clearcoat: 1.0, transparent: true, opacity: 0.9
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(Math.cos(a) * r, Math.sin(a) * r, -TUNNEL_LENGTH + 10);
    scene.add(mesh);
    powerups.push({ mesh, type, speed: OBSTACLE_SPEED * 0.7 });
  }
  function activatePowerup(type) {
    playPowerup();
    if (type.effect === 'shield') { shield = 2; updateLivesUI(); spawnBonusPopup('护盾 x2'); }
    else { activePowerup = type.effect; powerupTimer = 6; powerupInd.textContent = type.name; powerupInd.classList.add('active'); spawnBonusPopup(type.name); }
  }
  function spawnBonusPopup(text) {
    const el = document.createElement('div'); el.className = 'bonus-popup';
    el.textContent = text; el.style.left = '50%'; el.style.top = '45%'; el.style.transform = 'translateX(-50%)';
    document.body.appendChild(el); setTimeout(() => el.remove(), 1200);
  }
  function spawnScorePopup(pts) {
    const el = document.createElement('div'); el.className = 'score-popup';
    el.textContent = '+' + pts;
    el.style.left = (Math.random() * 40 + 30) + '%'; el.style.top = (Math.random() * 20 + 35) + '%';
    document.body.appendChild(el); setTimeout(() => el.remove(), 900);
  }

  // ─── DAMAGE ───
  function takeDamage() {
    if (shield > 0) {
      shield--; updateLivesUI(); playDamage();
      shakeIntensity = 0.3;
      spawnBonusPopup('护盾抵挡!');
      return;
    }
    lives--; updateLivesUI(); playDamage();
    shakeIntensity = 0.5;
    // Strong glitch + chromatic aberration on damage
    glitchIntensity = Math.min(glitchIntensity + 0.8, 1.2);
    if (glitchPass) glitchPass.uniforms.u_aberration.value = 0.2;
    damageFlash.classList.add('active');
    setTimeout(() => damageFlash.classList.remove('active'), 120);
    combo = 1; comboTimer = 0; comboEl.textContent = 'x1';
    if (lives <= 0) {
      gameActive = false;
      stopMusic();
      finalScoreE.textContent = score;
      statLineEl.textContent = '击毁目标: ' + kills + ' \u2022 波次: ' + wave + ' \u2022 最高连击: x' + maxCombo;
      gameOverScr.classList.add('visible');
    }
  }

  // ═══ 3. GPU SPARK EXPLOSIONS ═══
  // ─── GPU EXPLOSION POOL ───
  const EXPLOSION_POOL_SIZE = 15;
  const EXPLOSION_PARTICLE_COUNT = 30;
  let explosionPool = [];

  function initExplosionPool() {
    for (let p = 0; p < EXPLOSION_POOL_SIZE; p++) {
      const count = EXPLOSION_PARTICLE_COUNT;
      const positions = new Float32Array(count * 3);
      const velocities = new Float32Array(count * 3);
      const livesArr = new Float32Array(count);
      const seeds = new Float32Array(count);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('a_velocity', new THREE.BufferAttribute(velocities, 3));
      geo.setAttribute('a_life', new THREE.BufferAttribute(livesArr, 1));
      geo.setAttribute('a_seed', new THREE.BufferAttribute(seeds, 1));
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          u_time: { value: 0.0 },
          u_maxAge: { value: 0.9 },
          u_color: { value: new THREE.Color() },
          u_impactDir: { value: new THREE.Vector3(0, 0, -1) },
        },
        vertexShader: SPARK_VERT,
        fragmentShader: SPARK_FRAG,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const points = new THREE.Points(geo, mat);
      points.visible = false;
      scene.add(points);
      explosionPool.push({ points, geo, mat, positions, velocities, livesArr, seeds, active: false, age: 0, maxAge: 0.9 });
    }
  }

  function createGPUExplosion(position, color, count, impactDir) {
    const dir = impactDir || new THREE.Vector3(0, 0, -1);
    // Find inactive pool entry
    let entry = null;
    for (let i = 0; i < explosionPool.length; i++) {
      if (!explosionPool[i].active) { entry = explosionPool[i]; break; }
    }
    if (!entry) {
      // Steal oldest active
      let oldest = null, oldestAge = -1;
      for (let i = 0; i < explosionPool.length; i++) {
        if (explosionPool[i].age > oldestAge) { oldest = explosionPool[i]; oldestAge = explosionPool[i].age; }
      }
      entry = oldest;
    }

    const cnt = EXPLOSION_PARTICLE_COUNT;
    const pos = entry.positions, vel = entry.velocities, lives = entry.livesArr, sd = entry.seeds;
    for (let i = 0; i < cnt; i++) {
      pos[i*3] = position.x; pos[i*3+1] = position.y; pos[i*3+2] = position.z;
      const theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
      const spd = 5 + Math.random() * 20;
      vel[i*3] = Math.sin(phi) * Math.cos(theta) * spd;
      vel[i*3+1] = Math.sin(phi) * Math.sin(theta) * spd;
      vel[i*3+2] = Math.cos(phi) * spd;
      lives[i] = 0.5 + Math.random() * 0.5;
      sd[i] = Math.random();
    }
    entry.geo.attributes.position.needsUpdate = true;
    entry.geo.attributes.a_velocity.needsUpdate = true;
    entry.geo.attributes.a_life.needsUpdate = true;
    entry.geo.attributes.a_seed.needsUpdate = true;

    const threeColor = color instanceof THREE.Color ? color : new THREE.Color(color);
    entry.mat.uniforms.u_time.value = 0;
    entry.mat.uniforms.u_color.value.copy(threeColor);
    entry.mat.uniforms.u_impactDir.value.copy(dir);
    entry.points.visible = true;
    entry.active = true;
    entry.age = 0;

    // Debris shards
    spawnDebris(position, color, dir, 8);
  }

  function updateExplosions(dt) {
    for (let i = 0; i < explosionPool.length; i++) {
      const e = explosionPool[i];
      if (!e.active) continue;
      e.age += dt;
      if (e.age > e.maxAge) { e.active = false; e.points.visible = false; continue; }
      e.mat.uniforms.u_time.value = e.age;
    }
    updateDebris(dt);
  }

  // ─── DEBRIS SHARDS: angular fragments that shatter outward ───
  const DEBRIS_POOL_SIZE = 120; // enough for ~10 kills at 12 shards each
  const DEBRIS_MAX_AGE = 0.8;
  let debrisPool = [], activeDebris = [];
  let sharedDebrisGeos = [];

  function initDebrisPool() {
    // Pre-create 3 small angular geometries for variety
    sharedDebrisGeos = [
      new THREE.TetrahedronGeometry(0.12, 0),
      new THREE.OctahedronGeometry(0.09, 0),
      new THREE.TetrahedronGeometry(0.07, 0),
    ];
    for (let i = 0; i < DEBRIS_POOL_SIZE; i++) {
      const geo = sharedDebrisGeos[i % sharedDebrisGeos.length];
      const mat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.5,
        metalness: 0.8, roughness: 0.2, transparent: true, opacity: 1,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.visible = false;
      scene.add(mesh);
      debrisPool.push({
        mesh, mat, active: false, age: 0,
        vx: 0, vy: 0, vz: 0,       // velocity
        rx: 0, ry: 0, rz: 0,       // rotation speed
        startScale: 1,
      });
    }
  }

  function spawnDebris(position, color, impactDir, count) {
    const threeColor = color instanceof THREE.Color ? color : new THREE.Color(color);
    const dir = impactDir || new THREE.Vector3(0, 0, -1);
    let spawned = 0;
    for (let i = 0; i < debrisPool.length && spawned < count; i++) {
      const d = debrisPool[i];
      if (d.active) continue;
      d.active = true;
      d.age = 0;
      // Position at explosion center with slight random offset
      d.mesh.position.set(
        position.x + (Math.random()-0.5)*0.3,
        position.y + (Math.random()-0.5)*0.3,
        position.z + (Math.random()-0.5)*0.3
      );
      // Velocity: biased along impact direction + random spread
      const speed = 5 + Math.random() * 10;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const randX = Math.sin(phi)*Math.cos(theta);
      const randY = Math.sin(phi)*Math.sin(theta);
      const randZ = Math.cos(phi);
      d.vx = (randX * 0.5 + dir.x * 0.8) * speed;
      d.vy = (randY * 0.5 + dir.y * 0.8) * speed;
      d.vz = (randZ * 0.5 + dir.z * 0.8) * speed;
      // Fast random tumble
      d.rx = (Math.random()-0.5) * 25;
      d.ry = (Math.random()-0.5) * 25;
      d.rz = (Math.random()-0.5) * 25;
      // Random initial scale
      d.startScale = 0.6 + Math.random() * 1.0;
      d.mesh.scale.setScalar(d.startScale);
      d.mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
      // Color from destroyed obstacle
      d.mat.color.copy(threeColor);
      d.mat.emissive.copy(threeColor);
      d.mat.opacity = 1;
      d.mesh.visible = true;
      activeDebris.push(d);
      spawned++;
    }
  }

  function updateDebris(dt) {
    for (let i = activeDebris.length - 1; i >= 0; i--) {
      const d = activeDebris[i];
      d.age += dt;
      if (d.age > DEBRIS_MAX_AGE) {
        d.active = false;
        d.mesh.visible = false;
        activeDebris.splice(i, 1);
        continue;
      }
      const t = d.age / DEBRIS_MAX_AGE;
      const drag = Math.exp(-d.age * 3.0);
      // Move
      d.mesh.position.x += d.vx * dt * drag;
      d.mesh.position.y += d.vy * dt * drag - dt * 4.0 * d.age; // gravity pull
      d.mesh.position.z += d.vz * dt * drag;
      // Tumble
      d.mesh.rotation.x += d.rx * dt;
      d.mesh.rotation.y += d.ry * dt;
      d.mesh.rotation.z += d.rz * dt;
      // Shrink to zero
      const s = d.startScale * (1 - t * t);
      d.mesh.scale.setScalar(Math.max(0.01, s));
      // Fade out
      d.mat.opacity = Math.max(0, 1 - t * t);
      // Emissive dims faster
      d.mat.emissiveIntensity = 1.5 * (1 - t);
    }
  }

  // ─── PHYSICS ───
  function constrainToCylinder(body) {
    const x = body.position.x, y = body.position.y;
    const r = Math.sqrt(x * x + y * y);
    const maxR = TUNNEL_RADIUS - BALL_RADIUS;
    if (r > maxR && r > 0.001) {
      const nx = x / r, ny = y / r;
      body.position.x = nx * maxR; body.position.y = ny * maxR;
      const dot = body.velocity.x * nx + body.velocity.y * ny;
      if (dot > 0) { body.velocity.x -= 2 * dot * nx; body.velocity.y -= 2 * dot * ny; }
    }
  }

  function checkBallObstacleCollisions() {
    for (let bi = balls.length - 1; bi >= 0; bi--) {
      const bp = balls[bi].body.position;
      for (let oi = obstacles.length - 1; oi >= 0; oi--) {
        const obs = obstacles[oi], op = obs.body.position;
        const dx = bp.x-op.x, dy = bp.y-op.y, dz = bp.z-op.z;
        const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
        const hitDist = BALL_RADIUS + obs.size * 0.55;
        if (dist < hitDist && dist > 0.001) {
          const nx=dx/dist, ny=dy/dist, nz=dz/dist;
          const v = balls[bi].body.velocity;
          const dot = v.x*nx+v.y*ny+v.z*nz;
          if (dot < 0) { v.x -= 2*dot*nx; v.y -= 2*dot*ny; v.z -= 2*dot*nz; }
          const overlap = hitDist - dist;
          bp.x += nx*overlap; bp.y += ny*overlap; bp.z += nz*overlap;
          // Pass ball velocity direction for directional explosion
          const bv = balls[bi].body.velocity;
          const ballDir = new THREE.Vector3(bv.x, bv.y, bv.z).normalize();
          hitObstacle(oi, ballDir); break;
        }
      }
    }
  }

  function updateShake(dt) {
    if (shakeIntensity > 0.001) {
      const sx = ((Math.random()-0.5)*shakeIntensity*24)|0;
      const sy = ((Math.random()-0.5)*shakeIntensity*24)|0;
      document.body.style.transform = 'translate('+sx+'px,'+sy+'px)';
      shakeIntensity *= Math.pow(0.02, dt);
    } else if (shakeIntensity > 0) { document.body.style.transform = ''; shakeIntensity = 0; }
  }

  // ─── GAME LOOP ───
  function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    globalTime += dt;

    // Hit-stop: slow time to 5% during freeze frames
    if (hitStopTimer > 0) {
      hitStopTimer -= dt;
      dt *= 0.05;
      engageHitStopAudio();
    } else {
      dt = Math.min(dt, 0.05);
      if (hitStopAudioActive) releaseHitStopAudio();
    }

    if (!gameActive) {
      // Keep visuals animating on title/gameover
      if (tunnelUniforms) tunnelUniforms.u_time.value = globalTime;
      if (nebulaUniforms) nebulaUniforms.u_time.value = globalTime;
      if (starLines) {
        const sp = starLines.geometry.attributes.position;
        for (let i = 0; i < sp.count / 2; i++) {
          sp.array[i*6+2] += dt * 20;
          sp.array[i*6+5] += dt * 20;
          if (sp.array[i*6+2] > 5) {
            const z = -TUNNEL_LENGTH - Math.random() * 20;
            sp.array[i*6+2] = z; sp.array[i*6+5] = z - (1.0 + Math.random() * 4.0);
          }
        }
        sp.needsUpdate = true;
      }
      // Tunnel rotation + ring movement on title screen too
      if (tunnelMesh) tunnelMesh.rotation.z += dt * 0.2;
      for (let ri = 0; ri < tunnelRings.length; ri++) {
        tunnelRings[ri].position.z += dt * 20;
        if (tunnelRings[ri].position.z > 5) tunnelRings[ri].position.z -= TUNNEL_LENGTH;
      }
      composer.render();
      return;
    }

    // Manual velocity integration for bullets (replaces world.step)
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i].body;
      b.position.x += b.velocity.x * dt;
      b.position.y += b.velocity.y * dt;
      b.position.z += b.velocity.z * dt;
    }
    difficulty = 1 + score / 5000;

    // Spawn — paused during wave break
    if (waveBreakTimer > 0) {
      waveBreakTimer -= dt;
      if (waveBreakTimer <= 0) {
        // Break over — advance to next wave
        waveBreakTimer = 0;
        wave++; waveThreshold = Math.floor(8 + wave * 3);
        wavePanelEl.textContent = '第 ' + wave + ' 波'; announceWave(wave);
        for (let i = 0; i < 3; i++) spawnObstacle();
      }
    } else {
      spawnAccum += dt;
      const spawnRate = Math.max(0.5, SPAWN_INTERVAL / difficulty);
      if (spawnAccum > spawnRate && obstacles.length < MAX_OBSTACLES) { spawnObstacle(); spawnAccum = 0; }
    }

    // Auto-fire while holding
    if (isHolding) {
      autoFireAccum += dt;
      const fireRate = activePowerup === 'rapid' ? AUTO_FIRE_INTERVAL * 0.5 : AUTO_FIRE_INTERVAL;
      while (autoFireAccum >= fireRate) {
        autoFireAccum -= fireRate;
        shootBall();
      }
    }

    // Update obstacles
    let closestZ = -999;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const obs = obstacles[i];
      // 远快近慢：z 越深速度越快，靠近玩家时减速
      const zNorm = Math.max(0, Math.min(1, -obs.body.position.z / TUNNEL_LENGTH));
      const speedMul = 0.4 + zNorm * 1.2;
      obs.body.position.z += obs.speed * speedMul * dt;
      obs.mesh.position.set(obs.body.position.x, obs.body.position.y, obs.body.position.z);
      // Rotate core and shell independently
      obs.mesh.children[0].rotation.x += dt * 1.5;
      obs.mesh.children[0].rotation.y += dt * 1.0;
      if (obs.mesh.children[1]) {
        obs.mesh.children[1].rotation.x -= dt * 0.8;
        obs.mesh.children[1].rotation.z += dt * 1.2;
      }
      if (obs.body.position.z > closestZ) closestZ = obs.body.position.z;
      if (obs.body.position.z > 5) {
        releaseObstacle(obs._poolEntry); obstacles.splice(i, 1);
        takeDamage();
      }
    }

    // Danger vignette
    const dangerLevel = Math.max(0, (closestZ + 10) / 15);
    if (dangerLevel > 0) {
      dangerVig.style.opacity = Math.min(dangerLevel * 0.6, 0.6);
      dangerVig.style.background = 'radial-gradient(ellipse at center, transparent 50%, rgba(255,40,40,' + (dangerLevel * 0.3) + '))';
    } else { dangerVig.style.opacity = '0'; }

    // Powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const pu = powerups[i];
      pu.mesh.position.z += pu.speed * dt;
      pu.mesh.rotation.x += dt * 2; pu.mesh.rotation.y += dt * 3;
      let picked = false;
      for (const b of balls) {
        const dx = b.body.position.x - pu.mesh.position.x;
        const dy = b.body.position.y - pu.mesh.position.y;
        const dz = b.body.position.z - pu.mesh.position.z;
        if (Math.sqrt(dx*dx+dy*dy+dz*dz) < 1.2) { picked = true; break; }
      }
      if (pu.mesh.position.z > 0) picked = true;
      if (picked) { activatePowerup(pu.type); scene.remove(pu.mesh); powerups.splice(i, 1); }
      else if (pu.mesh.position.z > 10) { scene.remove(pu.mesh); powerups.splice(i, 1); }
    }

    if (activePowerup && powerupTimer > 0) {
      powerupTimer -= dt;
      powerupInd.textContent = (activePowerup === 'rapid' ? '急速射击' : '三连发') + ' ' + powerupTimer.toFixed(1) + 's';
      if (powerupTimer <= 0) { activePowerup = null; powerupTimer = 0; powerupInd.classList.remove('active'); }
    }

    // Balls + trails
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i]; b.age += dt;
      constrainToCylinder(b.body);
      b.mesh.position.set(b.body.position.x, b.body.position.y, b.body.position.z);
      if (b.age > 6 || b.body.position.z < -TUNNEL_LENGTH - 10 || b.body.position.z > 10) {
        releaseBullet(b); balls.splice(i, 1);
      }
    }
    // Update tunnel ripple uniforms from active bullets
    const rippleArr = tunnelUniforms.u_ripples.value;
    const rc = Math.min(balls.length, 8);
    for (let i = 0; i < rc; i++) {
      const bp = balls[i].body.position;
      rippleArr[i].set(bp.x, bp.y, bp.z);
    }
    tunnelUniforms.u_rippleCount.value = rc;
    updateTrails();

    checkBallObstacleCollisions();
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) { combo = 1; comboEl.textContent = 'x1'; } }

    computeTrajectory();
    updateExplosions(dt);
    updateShake(dt);

    // ═══ 1. Tunnel shader uniforms ═══
    tunnelUniforms.u_time.value = globalTime;
    tunnelUniforms.u_combo.value += (combo - tunnelUniforms.u_combo.value) * dt * 4.0;
    // Combo accelerates tunnel scroll: base 0.04, up to ~0.2 at high combo
    const targetScroll = 0.04 + Math.min(combo * 0.008, 0.16);
    tunnelUniforms.u_scrollSpeed.value += (targetScroll - tunnelUniforms.u_scrollSpeed.value) * dt * 3.0;
    if (tunnelPulse > 0.01) {
      tunnelUniforms.u_pulse.value = tunnelPulse;
      tunnelPulse *= Math.pow(0.001, dt);
    } else { tunnelUniforms.u_pulse.value = 0; tunnelPulse = 0; }
    // Hue shift decay
    if (tunnelUniforms.u_hueShift.value > 0.001) {
      tunnelUniforms.u_hueShift.value *= Math.pow(0.05, dt);
      if (tunnelUniforms.u_hueShift.value < 0.001) tunnelUniforms.u_hueShift.value = 0;
    }

    // Camera banking (roll based on aim X)
    const targetRoll = mouseNDC.x * -0.35;
    camera.rotation.z += (targetRoll - camera.rotation.z) * dt * 5.0;

    // Tunnel slow self-rotation
    tunnelMesh.rotation.z += dt * 0.2;

    // Structural rings fly toward camera
    for (let ri = 0; ri < tunnelRings.length; ri++) {
      const ring = tunnelRings[ri];
      ring.position.z += dt * BALL_SPEED * 0.8;
      if (ring.position.z > 5) {
        ring.position.z -= TUNNEL_LENGTH;
      }
    }

    // Starfield warp lines scroll (speed increases with combo)
    if (starLines) {
      const warpSpeed = 20 + (combo > 5 ? combo * 1.5 : 0);
      const sp = starLines.geometry.attributes.position;
      for (let i = 0; i < sp.count / 2; i++) {
        sp.array[i*6+2] += dt * warpSpeed;
        sp.array[i*6+5] += dt * warpSpeed;
        if (sp.array[i*6+2] > 5) {
          const z = -TUNNEL_LENGTH - Math.random() * 20;
          const length = 1.0 + Math.random() * 4.0;
          sp.array[i*6+2] = z;
          sp.array[i*6+5] = z - length;
        }
      }
      sp.needsUpdate = true;
    }

    // Nebula animation
    if (nebulaUniforms) {
      nebulaUniforms.u_time.value = globalTime;
      nebulaUniforms.u_hueShift.value = tunnelUniforms.u_hueShift.value;
    }


    // Reactive fog (life-based mood)
    {
      const targetFogColor = new THREE.Color(0x06060e);
      let targetFogDensity = 0.008;
      if (lives <= 1) {
        targetFogColor.setHex(0x3a0005);
        targetFogDensity = 0.025;
      } else if (combo >= 20) {
        targetFogColor.setHex(0x0a0218);
        targetFogDensity = 0.002;
      } else if (combo >= 10) {
        targetFogColor.setHex(0x1a0525);
        targetFogDensity = 0.004;
      }
      scene.fog.color.lerp(targetFogColor, dt * 2.0);
      scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, targetFogDensity, dt * 2.0);
    }

    // FOV pulse
    if (fovPulse > 0.01) {
      camera.fov = baseFov + fovPulse * 12;
      camera.updateProjectionMatrix();
      fovPulse *= Math.pow(0.005, dt);
    } else if (fovPulse > 0) { camera.fov = baseFov; camera.updateProjectionMatrix(); fovPulse = 0; }

    // ═══ 4. Post-processing: tight bloom + glitch decay ═══
    const targetBloom = 1.0 + tunnelPulse * 1.5;
    bloomPass.strength += (targetBloom - bloomPass.strength) * dt * 8.0;

    // Glitch intensity exponential decay (~0.15s)
    if (glitchIntensity > 0.001) {
      glitchIntensity *= Math.pow(0.0001, dt); // Very fast decay
      if (glitchIntensity < 0.001) glitchIntensity = 0;
    }
    glitchPass.uniforms.u_intensity.value = glitchIntensity;
    glitchPass.uniforms.u_time.value = globalTime;

    // Skip full-screen glitch pass when no effects are active
    const hasGlitchEffects = glitchIntensity > 0 ||
      glitchPass.uniforms.u_aberration.value > 0 ||
      glitchPass.uniforms.u_dofStrength.value > 0.002;
    glitchPass.enabled = hasGlitchEffects;

    // Chromatic aberration decay
    if (glitchPass.uniforms.u_aberration.value > 0.001) {
      glitchPass.uniforms.u_aberration.value *= Math.pow(0.0001, dt);
      if (glitchPass.uniforms.u_aberration.value < 0.001) glitchPass.uniforms.u_aberration.value = 0;
    }

    // Dynamic DoF — sharpen at high combo, blur at low life
    const targetDof = lives <= 1 ? 0.03 : (combo >= 10 ? 0.003 : 0.012);
    glitchPass.uniforms.u_dofStrength.value += (targetDof - glitchPass.uniforms.u_dofStrength.value) * dt * 4.0;

    composer.render();
  }

  // ─── EVENTS ───
  function onResize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  }
  function updateNDC(cx, cy) {
    mouseNDC.x = (cx / innerWidth) * 2 - 1;
    mouseNDC.y = -(cy / innerHeight) * 2 + 1;
  }
  function onMouseMove(e) { updateNDC(e.clientX, e.clientY); }
  function onTouchStart(e) {
    if (!gameActive) return;
    e.preventDefault(); const t = e.touches[0];
    updateNDC(t.clientX, t.clientY);
    isHolding = true; autoFireAccum = 0;
    shootBall();
  }
  function onTouchMove(e) {
    if (!gameActive) return;
    updateNDC(e.touches[0].clientX, e.touches[0].clientY);
  }
  function onShoot() {
    if (!gameActive) return;
    isHolding = true; autoFireAccum = 0;
    shootBall();
  }
  function onPointerUp() { isHolding = false; autoFireAccum = 0; }

  function startGame() {
    titleScreen.classList.remove('visible');
    titleScreen.classList.add('hidden');
    if (window._stopTitleParticles) window._stopTitleParticles();
    gameActive = true;
    resetState();
    // Spawn initial wave immediately so the player isn't waiting
    for (let i = 0; i < 3; i++) spawnObstacle();
    startMusic();
  }
  function restartGame() {
    gameOverScr.classList.remove('visible');
    resetState();
    for (let i = 0; i < 3; i++) spawnObstacle();
    gameActive = true;
    startMusic();
  }
  function resetState() {
    balls.forEach(b => releaseBullet(b));
    obstacles.forEach(o => releaseObstacle(o._poolEntry));
    explosionPool.forEach(e => { e.active = false; e.points.visible = false; e.age = 0; });
    activeDebris.forEach(d => { d.active = false; d.mesh.visible = false; });
    activeDebris = [];
    powerups.forEach(p => scene.remove(p.mesh));
    balls = []; obstacles = []; powerups = [];
    score = 0; combo = 1; comboTimer = 0; maxCombo = 1; kills = 0;
    lives = MAX_LIVES; ammoRegenAccum = 0;
    spawnAccum = 0; difficulty = 1; shakeIntensity = 0;
    wave = 1; waveKills = 0; waveThreshold = 8; waveBreakTimer = 0; tunnelPulse = 0; fovPulse = 0;
    glitchIntensity = 0;
    hitStopTimer = 0;
    isHolding = false; autoFireAccum = 0;
    camera.fov = baseFov; camera.rotation.z = 0; camera.updateProjectionMatrix();
    activePowerup = null; powerupTimer = 0; shield = 0;
    // Reset fog
    if (scene.fog) { scene.fog.density = 0.008; scene.fog.color.setHex(0x06060e); }
    scoreEl.textContent = '0'; comboEl.textContent = 'x1';
    wavePanelEl.textContent = '第 1 波';
    powerupInd.classList.remove('active');
    dangerVig.style.opacity = '0';
    tunnelUniforms.u_hueShift.value = 0;
    tunnelUniforms.u_pulse.value = 0;
    if (glitchPass) {
      glitchPass.uniforms.u_intensity.value = 0;
      glitchPass.uniforms.u_aberration.value = 0;
    }
    updateLivesUI();
    document.body.style.transform = '';
  }

  // ─── BOOT ───
  init();
})();
</script>
</body>
</html>
